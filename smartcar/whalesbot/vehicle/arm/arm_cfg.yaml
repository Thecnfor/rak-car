  slow_band_m: 0.02
  slow_velocity: 0.05
  top_slow_m: 0.02
  top_slow_velocity: 0.1
  reset_target_m: 0.34
  # reset_velocity: 0.05 m/s (5cm/s)。实测最小可驱动速度:
  #   - 0.02/0.03 m/s 电机扭矩过不了静摩擦,编码器不动 → 触发误报
  #   - 0.05 m/s 能驱动,且不撞墙反弹 — 之前 reset_x 测试这个速度稳
  # 配合 arm_base.py 的 MIN_PRE_TRIGGER_DISP=50mm 预触发距离闸:
  #   车必须真走出 50mm 才能进入撞墙判据,杜绝"电机没动但 ratio=0 误判撞墙"
  reset_velocity: 0.05
  reset_dwell_time: 0.15
  reset_timeout: 25.0
  wall_ratio_threshold: 0.2
  min_velocity_ratio: 0.3
  wall_window_ms: 200
  enable_encoder_reset: true
